version: "3.8"

services:
  # The old MVP Node server (left intact)
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
    networks:
      - remitwise_net
    volumes:
      - ./server:/app
      - /app/node_modules

  # New Enterprise PostgreSQL Database
  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: remitwise_admin
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: remitwise_enterprise
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - remitwise_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remitwise_admin -d remitwise_enterprise"]
      interval: 5s
      timeout: 5s
      retries: 5

  # New Enterprise FastAPI Backend
  backend:
    build:
      context: ./enterprise/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://remitwise_admin:secure_password_123@db:5432/remitwise_enterprise
    depends_on:
      db:
        condition: service_healthy
    networks:
      - remitwise_net
    volumes:
      - ./enterprise/backend:/app  # For hot-reloading in dev

  # New Enterprise Next.js Frontend
  frontend:
    build:
      context: ./enterprise/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - remitwise_net
    # In production standalone, volumes are not mapped to override the build,
    # but since we're using standalone dockerfile, we just run the built image.

volumes:
  pgdata:

networks:
  remitwise_net:
    driver: bridge
