<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remitwise App</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: '#FDFAFF',
              primary: '#0262A8',
              cardBg: '#F7F4FA',
              textPrimary: '#1E1428',
              textSecondary: '#8B749B',
              brandPurple: '#422864',
              accentPurple: '#EAE2F6',
              success: '#00A36C'
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
      body {
        margin: 0;
        background-color: #f0f0f0;
        font-family: 'Inter', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px 0;
        box-sizing: border-box;
      }
      .mobile-container {
        width: 375px;
        height: 812px;
        max-height: calc(100vh - 40px);
        background-color: #FDFAFF;
        border-radius: 40px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        overflow: hidden;
        position: relative;
        display: flex;
        flex-direction: column;
      }
      /* Hide scrollbar */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      const Icon = ({ name, size = 20, className = "" }) => (
        <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>
      );

      function RemitwiseApp() {
        const [sendAmount, setSendAmount] = useState('1000.00');
        const [midRate, setMidRate] = useState(56.42);
        const [providers, setProviders] = useState([]);
        const [baseCurrency, setBaseCurrency] = useState('SAR');
        const [targetCurrency, setTargetCurrency] = useState('PHP');
        const [availableBases, setAvailableBases] = useState(['SAR', 'USD']);
        const [availableTargets, setAvailableTargets] = useState(['PHP', 'INR', 'PKR', 'EGP']);
        const [trendGrowth, setTrendGrowth] = useState({ percentage: '0.24', trend: 'up' });
        const [currentTab, setCurrentTab] = useState('home');
        const [allTrends, setAllTrends] = useState([]);
        const [showAllProviders, setShowAllProviders] = useState(false);
        const [refreshTrigger, setRefreshTrigger] = useState(0);
        const [isRefreshing, setIsRefreshing] = useState(false);
        // Trend Details State
        const [selectedTrend, setSelectedTrend] = useState(null); 
        const [chartData, setChartData] = useState([]);
        const [chartLoading, setChartLoading] = useState(false);
        const [chartFilter, setChartFilter] = useState('30D'); // 'Today', '7D', '30D', '90D', '1Y', 'Custom'
        const [customFrom, setCustomFrom] = useState('');
        const [customTo, setCustomTo] = useState('');
        const [showCustomPicker, setShowCustomPicker] = useState(false);
        const [liveToggle, setLiveToggle] = useState(false);
        const [hoverData, setHoverData] = useState(null); 
        
        // Calculator State
        const [calcAmount, setCalcAmount] = useState('100.00');
        const [calcBase, setCalcBase] = useState('SAR');
        const [calcTarget, setCalcTarget] = useState('INR');
        const [calcFee, setCalcFee] = useState('0');
        const [calcDate, setCalcDate] = useState(new Date().toISOString().split('T')[0]);
        const [calcResult, setCalcResult] = useState(null);

        const handleCalculate = async () => {
          try {
            // Fetch historical best rate
            const histRes = await fetch(`/api/rates/historical/${calcBase}/${calcTarget}?date=${encodeURIComponent(calcDate)}`);
            const histData = await histRes.json();
            
            // Fetch current best rate
            const currRes = await fetch(`/api/providers/${calcBase}/${calcTarget}`);
            const currData = await currRes.json();
            const currentBestRate = currData && currData.length > 0 ? currData[0].buy_rate : 0;
            
            const amount = parseFloat(calcAmount) || 0;
            const feeRaw = calcFee.replace('%', '');
            const feeAmount = (amount * (parseFloat(feeRaw) || 0)) / 100;
            const finalAmount = amount - feeAmount;

            let isProfit = false;
            let difference = 0;
            
            if (histData.found && currentBestRate > 0) {
              const histTargetValue = finalAmount * histData.rate;
              const currTargetValue = finalAmount * currentBestRate;
              difference = currTargetValue - histTargetValue;
              isProfit = difference >= 0;
            }

            setCalcResult({
              found: histData.found,
              historicalRate: histData.rate,
              currentRate: currentBestRate,
              finalAmount,
              transactionAmount: finalAmount * histData.rate,
              isProfit,
              profitAmount: Math.abs(difference)
            });
            setTimeout(() => lucide.createIcons(), 100);
          } catch (error) {
            console.error("Calculation failed", error);
            setCalcResult({ error: "Failed to calculate rates." });
          }
        };

        const getProviderBranding = (name) => {
          const n = name.toLowerCase();
          if (n.includes('wise')) return { bg: '#00B9FF', initials: 'W', text: 'text-white' };
          if (n.includes('western union') || n.includes('wu')) return { bg: '#FFD100', initials: 'WU', text: 'text-black' };
          if (n.includes('stc')) return { bg: '#4F46E5', initials: 'STC', text: 'text-white' };
          if (n.includes('al rajhi')) return { bg: '#1E3A8A', initials: 'AR', text: 'text-white' };
          if (n.includes('enjaz')) return { bg: '#DC2626', initials: 'ENJ', text: 'text-white' };
          return { bg: '#9CA3AF', initials: name.substring(0, 2).toUpperCase(), text: 'text-white' };
        };
        
        // Fetch available bases and targets (with polling)
        useEffect(() => {
          const fetchCurrencies = () => {
            fetch('/api/currencies')
              .then(res => res.json())
              .then(data => {
                if (data.bases) {
                  // Only update if changed to avoid unnecessary re-renders
                  setAvailableBases(prev => JSON.stringify(prev) !== JSON.stringify(data.bases) ? data.bases : prev);
                }
                if (data.targets) {
                  setAvailableTargets(prev => JSON.stringify(prev) !== JSON.stringify(data.targets) ? data.targets : prev);
                }
              })
              .catch(console.error);
          };
          
          fetchCurrencies();
          const interval = setInterval(fetchCurrencies, 5000);
          return () => clearInterval(interval);
        }, []);

        // Fetch live rates and trends when currency pair changes (with polling)
        useEffect(() => {
          const fetchData = () => {
            setIsRefreshing(true);
            const cb = Date.now();
            
            Promise.all([
              fetch(`/api/providers/${baseCurrency}/${targetCurrency}?t=${cb}`).then(res => res.json()),
              fetch(`/api/trends/${baseCurrency}/${targetCurrency}?t=${cb}`).then(res => res.json())
            ])
            .then(([providersData, trendsData]) => {
              if (providersData && providersData.length > 0) {
                setProviders(providersData);
                setMidRate(providersData[0].buy_rate); 
              } else {
                setProviders([]);
                setMidRate(0);
              }
              
              if (trendsData) {
                setTrendGrowth({ percentage: trendsData.growthPercentage, trend: trendsData.trend });
              }
              
              setTimeout(() => lucide.createIcons(), 100);
            })
            .catch(console.error)
            .finally(() => {
              setTimeout(() => setIsRefreshing(false), 500); // Minimum spin duration for UX
            });
          };

          fetchData();
          const interval = setInterval(fetchData, 5000); // Live poll every 5s
          return () => clearInterval(interval);
        }, [baseCurrency, targetCurrency, refreshTrigger]);

        // Fetch all trends when on the trends tab
        useEffect(() => {
          if (currentTab !== 'trends') return;
          const fetchAllTrends = () => {
            fetch(`/api/trends/${baseCurrency}/all?t=${Date.now()}`)
              .then(res => res.json())
              .then(data => {
                setAllTrends(data || []);
                setTimeout(() => lucide.createIcons(), 100);
              })
              .catch(console.error);
          };
          fetchAllTrends();
          const interval = setInterval(fetchAllTrends, 5000);
          return () => clearInterval(interval);
        }, [currentTab, baseCurrency]);

        // Fetch chart data when a trend is selected
        useEffect(() => {
          if (!selectedTrend) return;
          const fetchChart = () => {
            setChartLoading(true);
            let url = `/api/rates/chart/${baseCurrency}/${selectedTrend.target}?t=${Date.now()}`;
            if (chartFilter === 'Custom' && customFrom && customTo) {
               url += `&from=${customFrom}&to=${customTo}`;
            } else {
               const daysMap = { 'Today': 1, '7D': 7, '30D': 30, '90D': 90, '1Y': 365 };
               url += `&days=${daysMap[chartFilter] || 30}`;
            }
            
            fetch(url)
              .then(res => res.json())
              .then(data => {
                setChartData(data || []);
                setChartLoading(false);
              })
              .catch(e => {
                console.error(e);
                setChartLoading(false);
              });
          };
          fetchChart();
          
          if (liveToggle) {
             const interval = setInterval(fetchChart, 30000);
             return () => clearInterval(interval);
          }
        }, [selectedTrend, chartFilter, customFrom, customTo, liveToggle, baseCurrency]);

        return (
          <div className="mobile-container">
            
            {/* Top Navbar */}
            <div className="pt-12 pb-4 px-6 flex justify-between items-center bg-background z-10 relative">
              <div className="flex items-center space-x-4">
                <Icon name="menu" size={24} className="text-textPrimary" />
                <span className="text-xl font-medium text-textPrimary tracking-tight">Remitwise</span>
              </div>
              <div className="flex items-center space-x-4">
                <Icon name="search" size={20} className="text-textPrimary" />
                <div className="w-8 h-8 rounded-full bg-accentPurple flex items-center justify-center text-xs font-bold text-brandPurple">
                  JD
                </div>
              </div>
            </div>

            {/* Scrollable Content */}
            <div className="flex-1 overflow-y-auto no-scrollbar px-6 pb-24 relative z-0">
              
              {currentTab === 'home' && (
                <>
                  {/* Mid Market Rate Card */}
              <div className="bg-primary rounded-3xl p-6 text-white mb-6 shadow-lg shadow-primary/20 relative overflow-hidden">
                <div className="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full blur-[30px] transform translate-x-10 -translate-y-10 pointer-events-none"></div>
                <div className="flex justify-between items-start relative z-10">
                  <div>
                    <div className="text-[10px] font-bold uppercase tracking-wider text-white/80 mb-1">Current Mid-Market Rate</div>
                    <div className="flex items-baseline space-x-2">
                      <span className="text-4xl font-black">{midRate.toFixed(2)}</span>
                      <span className="text-sm font-bold text-white/80">{targetCurrency}</span>
                    </div>
                    <div className={`flex items-center mt-2 text-xs font-semibold ${trendGrowth.trend === 'down' ? 'text-red-400' : 'text-[#66FF99]'}`}>
                      <Icon name={trendGrowth.trend === 'down' ? 'trending-down' : 'trending-up'} size={14} className="mr-1" />
                      {trendGrowth.trend === 'down' ? '-' : '+'}{trendGrowth.percentage}% <span className="text-white/60 ml-1 font-normal">vs yesterday</span>
                    </div>
                  </div>
                  <button 
                    onClick={() => setRefreshTrigger(prev => prev + 1)}
                    disabled={isRefreshing}
                    className="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition-colors disabled:opacity-50"
                  >
                    <Icon name="refresh-cw" size={18} className={`text-white ${isRefreshing ? 'animate-spin' : ''}`} />
                  </button>
                </div>
              </div>

              {/* Conversion Module */}
              <div className="relative mb-8">
                {/* Swap Button (Floating) */}
                <div className="absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 z-10 w-8 h-8 bg-accentPurple rounded-full flex items-center justify-center border-4 border-background shadow-sm">
                  <Icon name="arrow-up-down" size={14} className="text-brandPurple" />
                </div>

                <div className="bg-cardBg rounded-3xl p-5 mb-2">
                  <div className="flex justify-between items-center">
                    <div>
                      <div className="text-[10px] font-bold text-textSecondary uppercase tracking-widest mb-1">You Send</div>
                      <input 
                        type="text" 
                        value={sendAmount}
                        onChange={(e) => setSendAmount(e.target.value)}
                        className="bg-transparent text-xl font-bold text-textPrimary focus:outline-none w-32"
                      />
                    </div>
                    <div className="bg-white rounded-xl px-1 py-1 flex items-center shadow-sm border border-black/5">
                      <select 
                        value={baseCurrency}
                        onChange={(e) => setBaseCurrency(e.target.value)}
                        className="bg-transparent text-sm font-bold text-textPrimary focus:outline-none cursor-pointer appearance-none px-2"
                      >
                        {availableBases.map(c => <option key={c} value={c}>{c}</option>)}
                      </select>
                      <Icon name="chevron-down" size={14} className="text-textSecondary mr-1" />
                    </div>
                  </div>
                </div>

                <div className="bg-cardBg rounded-3xl p-5">
                  <div className="flex justify-between items-center">
                    <div>
                      <div className="text-[10px] font-bold text-textSecondary uppercase tracking-widest mb-1">They Receive</div>
                      <div className="text-xl font-bold text-textPrimary">
                        {((parseFloat(sendAmount) || 0) * midRate).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                      </div>
                    </div>
                    <div className="bg-white rounded-xl px-1 py-1 flex items-center shadow-sm border border-black/5">
                      <select 
                        value={targetCurrency}
                        onChange={(e) => setTargetCurrency(e.target.value)}
                        className="bg-transparent text-sm font-bold text-textPrimary focus:outline-none cursor-pointer appearance-none px-2"
                      >
                        {availableTargets.map(c => <option key={c} value={c}>{c}</option>)}
                      </select>
                      <Icon name="chevron-down" size={14} className="text-textSecondary mr-1" />
                    </div>
                  </div>
                </div>
              </div>

              {/* Top Rate Providers */}
              <div>
                <div className="flex justify-between items-center mb-4">
                  <h3 className="text-xs font-bold text-brandPurple uppercase tracking-widest">Top Rate Providers</h3>
                  {providers.length > 0 && (
                    <button 
                      onClick={() => setShowAllProviders(true)} 
                      className="text-[10px] font-bold text-brandPurple uppercase tracking-widest hover:opacity-80 transition-opacity"
                    >
                      View All {providers.length > 3 ? `(${providers.length})` : ''}
                    </button>
                  )}
                </div>

                <div className="space-y-3">
                  {providers.slice(0, 3).map((p, idx) => {
                    const branding = getProviderBranding(p.bank_name);
                    const isBest = idx === 0;
                    
                    return (
                      <div key={idx} className="bg-white rounded-[1.5rem] p-4 flex items-center justify-between border border-black/5 shadow-[0_4px_20px_-10px_rgba(0,0,0,0.05)]">
                        <div className="flex items-center space-x-4">
                          <div className={`w-12 h-12 rounded-2xl flex items-center justify-center font-black text-xl ${branding.text}`} style={{ backgroundColor: branding.bg }}>
                            {branding.initials}
                          </div>
                          <div>
                            <div className="font-bold text-textPrimary text-sm">{p.bank_name}</div>
                            <div className="text-[10px] text-textSecondary mt-0.5">
                              Fee: {p.fee || '$0.00'} • Est: {isBest ? 'Fast' : '1-2 days'}
                            </div>
                          </div>
                        </div>
                        <div className="text-right">
                          <div className="font-bold text-textPrimary text-sm">{p.buy_rate.toFixed(2)} {targetCurrency}</div>
                          <div className={`text-[9px] font-bold uppercase tracking-wider mt-0.5 ${p.badgeClass || (isBest ? 'text-success' : 'text-textSecondary')}`}>
                            {p.badge || (isBest ? 'Best Overall' : 'Standard')}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
                </>
              )}

              {currentTab === 'trends' && !selectedTrend && (
                <div className="space-y-6 animate-fadeIn">
                  <div className="flex justify-between items-center mb-2">
                    <h2 className="text-xl font-bold text-textPrimary">Market Trends</h2>
                    <div className="bg-white rounded-xl px-2 py-1 flex items-center shadow-sm border border-black/5">
                      <span className="text-[10px] font-bold text-textSecondary uppercase tracking-widest mr-2">Base:</span>
                      <select 
                        value={baseCurrency}
                        onChange={(e) => setBaseCurrency(e.target.value)}
                        className="bg-transparent text-sm font-bold text-textPrimary focus:outline-none cursor-pointer appearance-none pr-1"
                      >
                        {availableBases.map(c => <option key={c} value={c}>{c}</option>)}
                      </select>
                      <Icon name="chevron-down" size={14} className="text-textSecondary" />
                    </div>
                  </div>

                  <div className="space-y-3">
                    {!Array.isArray(allTrends) || allTrends.length === 0 ? (
                      <div className="text-center py-10 text-textSecondary text-sm font-medium">No trend data available for today.</div>
                    ) : (
                      allTrends.map((t, idx) => (
                        <div 
                          key={idx} 
                          onClick={() => setSelectedTrend({ target: t.target_currency, rate: t.rate, trend: t.trend, percentage: t.growthPercentage })}
                          className="bg-white rounded-[1.5rem] p-4 flex items-center justify-between border border-black/5 shadow-[0_4px_20px_-10px_rgba(0,0,0,0.05)] cursor-pointer hover:shadow-md transition-shadow"
                        >
                          <div className="flex items-center space-x-4">
                            <div className="w-12 h-12 rounded-2xl flex items-center justify-center font-black text-xl text-brandPurple bg-accentPurple">
                              {t.target_currency}
                            </div>
                            <div>
                              <div className="font-bold text-textPrimary text-sm">{baseCurrency} to {t.target_currency}</div>
                              <div className={`flex items-center mt-0.5 text-[10px] font-bold uppercase tracking-wider ${t.trend === 'down' ? 'text-red-500' : 'text-success'}`}>
                                <Icon name={t.trend === 'down' ? 'trending-down' : 'trending-up'} size={12} className="mr-1" />
                                {t.trend === 'down' ? '-' : '+'}{t.growthPercentage}% <span className="text-textSecondary lowercase font-medium ml-1">vs yesterday</span>
                              </div>
                            </div>
                          </div>
                          <div className="text-right">
                            <div className="font-bold text-textPrimary text-sm">{t.rate}</div>
                            <div className="text-[9px] font-bold text-textSecondary uppercase tracking-wider mt-0.5">Top Rate</div>
                          </div>
                        </div>
                      ))
                    )}
                  </div>
                </div>
              )}

              {currentTab === 'trends' && selectedTrend && (
                <div className="animate-fadeIn">
                  {/* Header */}
                  <div className="flex justify-between items-center mb-6">
                    <button 
                      onClick={() => setSelectedTrend(null)}
                      className="flex items-center text-textSecondary hover:text-textPrimary transition-colors cursor-pointer"
                    >
                      <Icon name="arrow-left" size={20} className="mr-1" />
                      <span className="font-bold text-sm">Back</span>
                    </button>
                    <div className="text-sm font-bold text-textPrimary tracking-widest uppercase">
                      {baseCurrency} &rarr; {selectedTrend.target}
                    </div>
                  </div>

                  {/* Hero Card */}
                  <div className="bg-white rounded-3xl p-6 mb-6 shadow-sm border border-black/5 relative overflow-hidden">
                    <div className="absolute top-0 right-0 p-4 opacity-5 pointer-events-none">
                      <Icon name="activity" size={100} />
                    </div>
                    <div className="flex items-center justify-between mb-4 relative z-10">
                      <div className="flex -space-x-2">
                        <div className="w-8 h-8 rounded-full bg-accentPurple text-brandPurple flex items-center justify-center font-bold text-xs z-10 border-2 border-white">{baseCurrency}</div>
                        <div className="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-xs border-2 border-white">{selectedTrend.target}</div>
                      </div>
                      <div className={`flex items-center text-xs font-bold bg-white px-2 py-1 rounded-lg shadow-sm border border-black/5 ${selectedTrend.trend === 'down' ? 'text-red-500' : 'text-success'}`}>
                        <Icon name={selectedTrend.trend === 'down' ? 'trending-down' : 'trending-up'} size={14} className="mr-1" />
                        {selectedTrend.trend === 'down' ? '-' : '+'}{selectedTrend.percentage}%
                      </div>
                    </div>
                    <div className="text-4xl font-black text-textPrimary mb-1 relative z-10">
                      {selectedTrend.rate.toFixed(4)} <span className="text-lg text-textSecondary font-bold">{selectedTrend.target}</span>
                    </div>
                    <div className="text-[10px] font-bold text-textSecondary uppercase tracking-widest relative z-10">
                      1 {baseCurrency} • Updated Just Now
                    </div>
                  </div>

                  {/* Date Filter */}
                  <div className="mb-6">
                    <div className="flex space-x-2 overflow-x-auto no-scrollbar pb-2">
                      {['Today', '7D', '30D', '90D', '1Y', 'Custom'].map(f => (
                        <button
                          key={f}
                          onClick={() => {
                            setChartFilter(f);
                            if (f === 'Custom') setShowCustomPicker(true);
                            else setShowCustomPicker(false);
                          }}
                          className={`px-4 py-2 rounded-2xl text-xs font-bold whitespace-nowrap transition-all border ${
                            chartFilter === f 
                              ? 'bg-brandPurple text-white border-brandPurple shadow-md' 
                              : 'bg-white text-textSecondary border-black/5 hover:border-black/10'
                          }`}
                        >
                          {f}
                        </button>
                      ))}
                    </div>
                    
                    {showCustomPicker && (
                      <div className="bg-white p-4 rounded-2xl border border-black/5 mt-2 flex items-end space-x-3 animate-fadeIn">
                        <div className="flex-1">
                          <label className="text-[10px] font-bold text-textSecondary uppercase mb-1 block">From</label>
                          <input 
                            type="date" 
                            value={customFrom}
                            onChange={(e) => setCustomFrom(e.target.value)}
                            className="w-full bg-background rounded-xl px-3 py-2 text-sm font-bold border border-black/5 focus:outline-none"
                          />
                        </div>
                        <div className="flex-1">
                          <label className="text-[10px] font-bold text-textSecondary uppercase mb-1 block">To</label>
                          <input 
                            type="date" 
                            value={customTo}
                            onChange={(e) => setCustomTo(e.target.value)}
                            className="w-full bg-background rounded-xl px-3 py-2 text-sm font-bold border border-black/5 focus:outline-none"
                          />
                        </div>
                      </div>
                    )}
                  </div>

                  {/* SVG Chart */}
                  <div className="bg-white rounded-3xl p-5 mb-6 shadow-sm border border-black/5 relative h-64 overflow-hidden">
                    {chartLoading ? (
                      <div className="absolute inset-0 flex items-center justify-center">
                        <Icon name="refresh-cw" className="animate-spin text-brandPurple" size={24} />
                      </div>
                    ) : (
                      chartData.length > 0 && (
                        <div 
                          className="w-full h-full relative"
                          onMouseLeave={() => setHoverData(null)}
                          onMouseMove={(e) => {
                             const rect = e.currentTarget.getBoundingClientRect();
                             const x = e.clientX - rect.left;
                             const index = Math.min(
                               chartData.length - 1, 
                               Math.max(0, Math.floor((x / rect.width) * chartData.length))
                             );
                             setHoverData(chartData[index]);
                          }}
                          onTouchMove={(e) => {
                             const rect = e.currentTarget.getBoundingClientRect();
                             const x = e.touches[0].clientX - rect.left;
                             const index = Math.min(
                               chartData.length - 1, 
                               Math.max(0, Math.floor((x / rect.width) * chartData.length))
                             );
                             setHoverData(chartData[index]);
                          }}
                        >
                          <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="w-full h-full overflow-visible">
                            <defs>
                              <linearGradient id="chartGradient" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stopColor="#422864" stopOpacity="0.3" />
                                <stop offset="100%" stopColor="#422864" stopOpacity="0" />
                              </linearGradient>
                            </defs>
                            {(() => {
                              const min = Math.min(...chartData.map(d => d.rate));
                              const max = Math.max(...chartData.map(d => d.rate));
                              const range = max - min || 1;
                              const points = chartData.map((d, i) => {
                                const x = (i / (chartData.length - 1)) * 100;
                                const y = 100 - (((d.rate - min) / range) * 80 + 10);
                                return `${x},${y}`;
                              }).join(' ');
                              
                              return (
                                <>
                                  <polygon points={`0,100 ${points} 100,100`} fill="url(#chartGradient)" />
                                  <polyline points={points} fill="none" stroke="#422864" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
                                </>
                              );
                            })()}
                          </svg>
                          
                          {/* Tooltip */}
                          {hoverData && (
                             <div className="absolute top-0 left-1/2 transform -translate-x-1/2 -translate-y-2 bg-textPrimary text-white px-4 py-2 rounded-xl text-xs font-bold shadow-lg pointer-events-none z-10 text-center whitespace-nowrap transition-transform">
                               <div className="text-white/70 mb-0.5">{hoverData.date}</div>
                               <div className="text-base">{hoverData.rate.toFixed(4)}</div>
                             </div>
                          )}
                        </div>
                      )
                    )}
                  </div>

                  {/* Stats Grid */}
                  {chartData.length > 0 && (
                    <div className="grid grid-cols-2 gap-3 mb-6">
                      <div className="bg-white rounded-2xl p-4 border border-black/5 shadow-sm">
                        <div className="text-[10px] font-bold text-textSecondary uppercase tracking-widest mb-1 flex items-center justify-between">Highest <Icon name="arrow-up" size={12} className="text-success" /></div>
                        <div className="text-lg font-black text-textPrimary">{Math.max(...chartData.map(d => d.rate)).toFixed(4)}</div>
                      </div>
                      <div className="bg-white rounded-2xl p-4 border border-black/5 shadow-sm">
                        <div className="text-[10px] font-bold text-textSecondary uppercase tracking-widest mb-1 flex items-center justify-between">Lowest <Icon name="arrow-down" size={12} className="text-red-500" /></div>
                        <div className="text-lg font-black text-textPrimary">{Math.min(...chartData.map(d => d.rate)).toFixed(4)}</div>
                      </div>
                      <div className="bg-white rounded-2xl p-4 border border-black/5 shadow-sm">
                        <div className="text-[10px] font-bold text-textSecondary uppercase tracking-widest mb-1 flex items-center justify-between">Average <Icon name="minus" size={12} className="text-textSecondary" /></div>
                        <div className="text-lg font-black text-textPrimary">{(chartData.reduce((a,b)=>a+b.rate, 0) / chartData.length).toFixed(4)}</div>
                      </div>
                      <div className="bg-white rounded-2xl p-4 border border-black/5 shadow-sm">
                        <div className="text-[10px] font-bold text-textSecondary uppercase tracking-widest mb-1 flex items-center justify-between">Change</div>
                        <div className={`text-lg font-black ${chartData[chartData.length-1].rate >= chartData[0].rate ? 'text-success' : 'text-red-500'}`}>
                           {(((chartData[chartData.length-1].rate - chartData[0].rate) / chartData[0].rate) * 100).toFixed(2)}%
                        </div>
                      </div>
                    </div>
                  )}

                  {/* AI Summary */}
                  <div className="bg-gradient-to-br from-accentPurple/50 to-white rounded-3xl p-5 mb-6 shadow-sm border border-brandPurple/20 relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-24 h-24 bg-brandPurple/5 rounded-bl-[100px] pointer-events-none"></div>
                    <div className="flex items-center space-x-2 mb-3 relative z-10">
                      <Icon name="sparkles" size={18} className="text-brandPurple" />
                      <h3 className="text-xs font-bold text-brandPurple uppercase tracking-widest">AI Market Analysis</h3>
                    </div>
                    {chartData.length > 0 ? (
                      <div className="text-sm font-medium text-textPrimary leading-relaxed relative z-10">
                        During the selected period ({chartData[0].date} to {chartData[chartData.length-1].date}), 
                        {baseCurrency} <span className="font-bold">{chartData[chartData.length-1].rate >= chartData[0].rate ? 'appreciated' : 'depreciated'}</span> by 
                        <span className={`font-bold ml-1 ${chartData[chartData.length-1].rate >= chartData[0].rate ? 'text-success' : 'text-red-500'}`}>
                          {Math.abs(((chartData[chartData.length-1].rate - chartData[0].rate) / chartData[0].rate) * 100).toFixed(2)}%
                        </span>. 
                        The market saw a peak of <span className="font-bold">{Math.max(...chartData.map(d => d.rate)).toFixed(4)}</span> and a low of <span className="font-bold">{Math.min(...chartData.map(d => d.rate)).toFixed(4)}</span>.
                        Based on current volatility, expected bounds for next week are <span className="font-bold">{Math.min(...chartData.map(d => d.rate)).toFixed(2)}–{Math.max(...chartData.map(d => d.rate)).toFixed(2)}</span>.
                      </div>
                    ) : (
                      <div className="text-sm font-medium text-textSecondary animate-pulse">Analyzing market trends...</div>
                    )}
                  </div>
                  
                  {/* Historical Table */}
                  <div className="bg-white rounded-3xl p-5 shadow-sm border border-black/5 mb-6">
                    <h3 className="text-xs font-bold text-textSecondary uppercase tracking-widest mb-4">Historical Log</h3>
                    <div className="space-y-0 max-h-64 overflow-y-auto no-scrollbar pr-2">
                      {[...chartData].reverse().map((d, idx) => (
                         <div key={idx} className="flex justify-between items-center py-3 border-b border-black/5 last:border-0 hover:bg-black/5 transition-colors px-2 rounded-xl">
                           <div className="font-semibold text-textPrimary text-sm">{d.date}</div>
                           <div className="font-bold text-textPrimary text-sm bg-background px-3 py-1 rounded-lg">{d.rate.toFixed(4)}</div>
                         </div>
                      ))}
                    </div>
                  </div>

                  <button 
                    onClick={() => {
                        setSendAmount(selectedTrend.rate.toFixed(2));
                        setTargetCurrency(selectedTrend.target);
                        setCurrentTab('home');
                        setSelectedTrend(null);
                    }}
                    className="w-full bg-primary hover:bg-textPrimary text-white font-bold py-4 px-6 rounded-2xl shadow-lg transition-all active:scale-95 mb-6 flex items-center justify-center space-x-2"
                  >
                    <span>Transfer Money Now</span>
                    <Icon name="arrow-right" size={18} />
                  </button>
                </div>
              )}

              {currentTab === 'calculator' && (
                <div className="space-y-6 animate-fadeIn">
                  <h2 className="text-xl font-bold text-textPrimary">Calculator & Insights</h2>
                  
                  <div className="bg-white rounded-[2rem] p-5 border border-black/5 shadow-sm space-y-4">
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-[10px] font-bold text-textSecondary uppercase tracking-widest mb-1">*From</label>
                        <select 
                          value={calcBase}
                          onChange={(e) => setCalcBase(e.target.value)}
                          className="w-full bg-transparent border border-black/10 rounded-xl px-3 py-2 text-sm font-bold focus:outline-none focus:border-brandPurple"
                        >
                          {availableBases.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-textSecondary uppercase tracking-widest mb-1">*Amount</label>
                        <input 
                          type="number"
                          value={calcAmount}
                          onChange={(e) => setCalcAmount(e.target.value)}
                          className="w-full bg-transparent border border-black/10 rounded-xl px-3 py-2 text-sm font-bold focus:outline-none focus:border-brandPurple"
                        />
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-[10px] font-bold text-textSecondary uppercase tracking-widest mb-1">*To</label>
                        <select 
                          value={calcTarget}
                          onChange={(e) => setCalcTarget(e.target.value)}
                          className="w-full bg-transparent border border-black/10 rounded-xl px-3 py-2 text-sm font-bold focus:outline-none focus:border-brandPurple"
                        >
                          {availableTargets.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-textSecondary uppercase tracking-widest mb-1">*Bank Fee</label>
                        <input 
                          type="text"
                          value={calcFee}
                          onChange={(e) => setCalcFee(e.target.value)}
                          className="w-full bg-transparent border border-black/10 rounded-xl px-3 py-2 text-sm font-bold focus:outline-none focus:border-brandPurple"
                          placeholder="e.g. 2%"
                        />
                      </div>
                    </div>

                    <div>
                      <label className="block text-[10px] font-bold text-textSecondary uppercase tracking-widest mb-1">Select Date of Transaction</label>
                      <input 
                        type="date"
                        value={calcDate}
                        onChange={(e) => setCalcDate(e.target.value)}
                        className="w-full bg-transparent border border-black/10 rounded-xl px-3 py-2 text-sm font-bold focus:outline-none focus:border-brandPurple"
                      />
                    </div>

                    <button 
                      onClick={handleCalculate}
                      className="mt-4 bg-textPrimary text-white font-bold text-sm px-6 py-2.5 rounded-full hover:bg-black transition-colors shadow-lg"
                    >
                      Calculate
                    </button>
                  </div>

                  {calcResult && (
                    <div className="bg-white rounded-[2rem] p-5 border border-black/5 shadow-sm space-y-4 animate-fadeIn">
                      {calcResult.error ? (
                        <div className="text-red-500 text-sm font-bold">Error: {calcResult.error}</div>
                      ) : !calcResult.found ? (
                        <div className="text-red-500 text-sm font-bold">No historical data found for this date.</div>
                      ) : (
                        <>
                          <div>
                            <div className="text-[10px] font-bold text-textSecondary uppercase tracking-widest mb-1">Historical Rate ({calcDate}):</div>
                            <div className="text-sm font-bold text-textPrimary">
                              1 {calcBase} = {calcResult.historicalRate.toFixed(4)} {calcTarget}
                            </div>
                          </div>
                          
                          <div>
                            <div className="text-[10px] font-bold text-textSecondary uppercase tracking-widest mb-1">Transaction Amount:</div>
                            <div className="text-lg font-black text-brandPurple">
                              {calcResult.finalAmount.toFixed(2)} {calcBase} = {calcResult.transactionAmount.toFixed(2)} {calcTarget}
                            </div>
                          </div>

                          <div className={`mt-4 p-3 rounded-xl border ${calcResult.isProfit ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                            <div className="flex items-center space-x-2 mb-1">
                              <Icon name="bot" size={16} className={calcResult.isProfit ? 'text-green-600' : 'text-red-600'} />
                              <span className={`text-xs font-bold uppercase tracking-widest ${calcResult.isProfit ? 'text-green-600' : 'text-red-600'}`}>
                                AI Insight: {calcResult.isProfit ? 'Profit' : 'Loss'}
                              </span>
                            </div>
                            <div className="text-xs font-medium text-textPrimary">
                              {calcResult.isProfit 
                                ? `By waiting to transact today at the current best rate of ${calcResult.currentRate.toFixed(4)}, you profit +${calcResult.profitAmount.toFixed(2)} ${calcTarget} compared to ${calcDate}.`
                                : `The rate was better on ${calcDate}. If you transact today at ${calcResult.currentRate.toFixed(4)}, you lose -${calcResult.profitAmount.toFixed(2)} ${calcTarget}.`}
                            </div>
                          </div>
                        </>
                      )}
                    </div>
                  )}
                </div>
              )}

              {currentTab === 'settings' && (
                <div className="space-y-6 animate-fadeIn pb-6">
                  <div className="flex items-center space-x-4 mb-2 mt-2">
                    <div className="w-16 h-16 rounded-full bg-accentPurple flex items-center justify-center text-2xl font-bold text-brandPurple">
                      JD
                    </div>
                    <div>
                      <h2 className="text-xl font-bold text-textPrimary">John Doe</h2>
                      <p className="text-sm text-textSecondary">Premium Member</p>
                    </div>
                  </div>

                  <div className="bg-white rounded-3xl p-5 shadow-sm border border-black/5">
                    <h3 className="text-xs font-bold text-textSecondary uppercase tracking-widest mb-4">Preferences</h3>
                    
                    <div className="flex justify-between items-center py-3 border-b border-black/5 cursor-pointer hover:opacity-70 transition-opacity">
                      <div className="flex items-center space-x-3">
                        <div className="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center text-blue-500">
                          <Icon name="bell" size={16} />
                        </div>
                        <span className="font-semibold text-textPrimary text-sm">Notifications</span>
                      </div>
                      <div className="w-10 h-6 bg-primary rounded-full relative">
                        <div className="absolute right-1 top-1 w-4 h-4 bg-white rounded-full shadow-sm"></div>
                      </div>
                    </div>
                    
                    <div className="flex justify-between items-center py-3 border-b border-black/5 cursor-pointer hover:opacity-70 transition-opacity">
                      <div className="flex items-center space-x-3">
                        <div className="w-8 h-8 rounded-full bg-purple-50 flex items-center justify-center text-purple-500">
                          <Icon name="globe" size={16} />
                        </div>
                        <span className="font-semibold text-textPrimary text-sm">Language</span>
                      </div>
                      <div className="flex items-center text-textSecondary text-sm font-semibold">
                        English <Icon name="chevron-right" size={16} className="ml-1" />
                      </div>
                    </div>

                    <div className="flex justify-between items-center py-3 cursor-pointer hover:opacity-70 transition-opacity">
                      <div className="flex items-center space-x-3">
                        <div className="w-8 h-8 rounded-full bg-green-50 flex items-center justify-center text-green-500">
                          <Icon name="shield" size={16} />
                        </div>
                        <span className="font-semibold text-textPrimary text-sm">Security</span>
                      </div>
                      <Icon name="chevron-right" size={16} className="text-textSecondary" />
                    </div>
                  </div>

                  <div className="bg-white rounded-3xl p-5 shadow-sm border border-black/5">
                    <h3 className="text-xs font-bold text-textSecondary uppercase tracking-widest mb-4">Support</h3>
                    
                    <div className="flex justify-between items-center py-3 border-b border-black/5 cursor-pointer hover:opacity-70 transition-opacity">
                      <div className="flex items-center space-x-3">
                        <div className="w-8 h-8 rounded-full bg-orange-50 flex items-center justify-center text-orange-500">
                          <Icon name="help-circle" size={16} />
                        </div>
                        <span className="font-semibold text-textPrimary text-sm">Help Center</span>
                      </div>
                      <Icon name="chevron-right" size={16} className="text-textSecondary" />
                    </div>

                    <div className="flex justify-between items-center py-3 cursor-pointer hover:opacity-70 transition-opacity">
                      <div className="flex items-center space-x-3">
                        <div className="w-8 h-8 rounded-full bg-red-50 flex items-center justify-center text-red-500">
                          <Icon name="log-out" size={16} />
                        </div>
                        <span className="font-semibold text-red-500 text-sm">Log Out</span>
                      </div>
                    </div>
                  </div>
                </div>
              )}

            </div>

            {/* Bottom Navigation */}
            <div className="fixed bottom-0 left-0 right-0 max-w-[480px] mx-auto bg-white/80 backdrop-blur-xl border-t border-black/5 px-6 py-4 flex justify-between items-center z-40 pb-safe">
              <button 
                onClick={() => setCurrentTab('home')}
                className={`flex flex-col items-center space-y-1 transition-colors ${currentTab === 'home' ? 'text-textPrimary' : 'text-textSecondary hover:text-textPrimary/70'}`}
              >
                <div className={`w-12 h-8 rounded-full flex items-center justify-center ${currentTab === 'home' ? 'bg-accentPurple text-brandPurple' : 'bg-transparent'}`}>
                  <Icon name="home" size={20} className={currentTab === 'home' ? 'text-brandPurple' : ''} />
                </div>
                <span className="text-[10px] font-bold">Home</span>
              </button>
              <button 
                onClick={() => setCurrentTab('trends')}
                className={`flex flex-col items-center space-y-1 transition-colors ${currentTab === 'trends' ? 'text-textPrimary' : 'text-textSecondary hover:text-textPrimary/70'}`}
              >
                <div className={`w-12 h-8 rounded-full flex items-center justify-center ${currentTab === 'trends' ? 'bg-accentPurple text-brandPurple' : 'bg-transparent'}`}>
                  <Icon name="trending-up" size={20} className={currentTab === 'trends' ? 'text-brandPurple' : ''} />
                </div>
                <span className="text-[10px] font-bold">Trends</span>
              </button>
              <button 
                onClick={() => setCurrentTab('calculator')}
                className={`flex flex-col items-center space-y-1 transition-colors ${currentTab === 'calculator' ? 'text-textPrimary' : 'text-textSecondary hover:text-textPrimary/70'}`}
              >
                <div className={`w-12 h-8 rounded-full flex items-center justify-center ${currentTab === 'calculator' ? 'bg-accentPurple text-brandPurple' : 'bg-transparent'}`}>
                  <Icon name="calculator" size={20} className={currentTab === 'calculator' ? 'text-brandPurple' : ''} />
                </div>
                <span className="text-[10px] font-bold">Calculator</span>
              </button>
              <button 
                onClick={() => setCurrentTab('settings')}
                className={`flex flex-col items-center space-y-1 transition-colors ${currentTab === 'settings' ? 'text-textPrimary' : 'text-textSecondary hover:text-textPrimary/70'}`}
              >
                <div className={`w-12 h-8 rounded-full flex items-center justify-center ${currentTab === 'settings' ? 'bg-accentPurple text-brandPurple' : 'bg-transparent'}`}>
                  <Icon name="settings" size={20} className={currentTab === 'settings' ? 'text-brandPurple' : ''} />
                </div>
                <span className="text-[10px] font-bold">Settings</span>
              </button>
            </div>

            {/* View All Providers Modal */}
            {showAllProviders && (
              <div className="fixed inset-0 bg-background z-50 flex flex-col animate-fadeIn max-w-[480px] mx-auto overflow-hidden">
                <div className="pt-12 pb-4 px-6 flex items-center bg-white border-b border-black/5 relative z-10">
                  <button onClick={() => setShowAllProviders(false)} className="mr-4 p-2 -ml-2 text-textPrimary hover:opacity-70 rounded-full hover:bg-black/5 transition-all">
                    <Icon name="arrow-left" size={24} />
                  </button>
                  <div>
                    <h2 className="text-xl font-bold text-textPrimary tracking-tight">All Partners</h2>
                    <p className="text-[10px] font-bold text-textSecondary uppercase tracking-widest">{baseCurrency} to {targetCurrency}</p>
                  </div>
                </div>
                <div className="flex-1 overflow-y-auto px-6 py-6 space-y-3 bg-background relative z-0 pb-24">
                  {providers.map((p, idx) => {
                    const branding = getProviderBranding(p.bank_name);
                    const isBest = idx === 0;
                    return (
                      <div key={idx} className="bg-white rounded-[1.5rem] p-4 flex items-center justify-between border border-black/5 shadow-[0_4px_20px_-10px_rgba(0,0,0,0.05)]">
                        <div className="flex items-center space-x-4">
                          <div className={`w-12 h-12 rounded-2xl flex items-center justify-center font-black text-xl ${branding.text}`} style={{ backgroundColor: branding.bg }}>
                            {branding.initials}
                          </div>
                          <div>
                            <div className="font-bold text-textPrimary text-sm">{p.bank_name}</div>
                            <div className="text-[10px] text-textSecondary mt-0.5">
                              Fee: {p.fee || '$0.00'} • Est: {isBest ? 'Fast' : '1-2 days'}
                            </div>
                          </div>
                        </div>
                        <div className="text-right">
                          <div className="font-bold text-textPrimary text-sm">{p.buy_rate.toFixed(2)} {targetCurrency}</div>
                          <div className={`text-[9px] font-bold uppercase tracking-wider mt-0.5 ${p.badgeClass || (isBest ? 'text-success' : 'text-textSecondary')}`}>
                            {p.badge || (isBest ? 'Best Overall' : 'Standard')}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
            
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<RemitwiseApp />);
    </script>
</body>
</html>
