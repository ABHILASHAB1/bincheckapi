<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remittance Intelligence Hub</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: '#0B0C10',
              panel: '#111218',
              surface: '#1A1C23',
              primary: '#3B82F6',
              success: '#10B981',
              brandBlue: '#4F46E5', // Indigo-like for selected states
            },
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
              mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'Liberation Mono', 'Courier New', 'monospace'],
            }
          }
        }
      }
    </script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
      body {
        margin: 0;
        height: 100vh;
        background-color: #0B0C10;
        font-family: 'Inter', sans-serif;
        overflow: hidden;
      }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root" class="h-full"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      const Icon = ({ name, size = 20, className = "" }) => (
        <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>
      );

      function RemittanceHub() {
        const [time, setTime] = useState(new Date().toLocaleTimeString('en-US', { hour12: true, hour: 'numeric', minute: '2-digit', second: '2-digit' }));
        const [wireInput, setWireInput] = useState(1000);
        const [selectedDest, setSelectedDest] = useState('PHP');
        const [pulse, setPulse] = useState('Anitha AI™ initializing cognitive algorithms...');
        const [payoutBreakdown, setPayoutBreakdown] = useState(null);
        
        const destinations = [
          { code: 'INR', label: 'INDIA (INR)', pair: 'SAR/INR' },
          { code: 'PKR', label: 'PAKISTAN (PKR)', pair: 'SAR/PKR' },
          { code: 'PHP', label: 'PHILIPPINES (PHP)', pair: 'SAR/PHP' }
        ];

        useEffect(() => {
          lucide.createIcons();
          const timer = setInterval(() => {
            setTime(new Date().toLocaleTimeString('en-US', { hour12: true, hour: 'numeric', minute: '2-digit', second: '2-digit' }));
          }, 1000);
          return () => clearInterval(timer);
        }, []);

        useEffect(() => {
          lucide.createIcons();
        }, [selectedDest, pulse, payoutBreakdown]);

        // Fetch AI Pulse
        useEffect(() => {
          const fetchPulse = async () => {
            try {
              const res = await fetch('http://localhost:3002/api/market-pulse');
              if (res.ok) {
                const data = await res.json();
                setPulse(data.pulse);
              }
            } catch (e) {
              console.error(e);
            }
          };
          fetchPulse();
          const interval = setInterval(fetchPulse, 10000);
          return () => clearInterval(interval);
        }, []);

        // Server-side Math Calculation
        useEffect(() => {
          const activePair = destinations.find(d => d.code === selectedDest)?.pair;
          if (!activePair) return;

          const fetchBreakdown = async () => {
            try {
              const res = await fetch('http://localhost:3002/api/payout-calculator', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ baseAmount: wireInput, pair: activePair, flatCommission: 0 })
              });
              if (res.ok) {
                const data = await res.json();
                setPayoutBreakdown(data);
              } else {
                setPayoutBreakdown(null);
              }
            } catch (e) {
              console.error(e);
              setPayoutBreakdown(null);
            }
          };
          fetchBreakdown();
          
          // Poll math slightly faster than pulse to catch ECB micro-volatility
          const mathInterval = setInterval(fetchBreakdown, 5000);
          return () => clearInterval(mathInterval);
        }, [wireInput, selectedDest]);

        return (
          <div className="flex flex-col h-screen text-gray-300">
            {/* Top Slim Navbar */}
            <div className="h-10 bg-black flex justify-between items-center px-6 border-b border-white/5 text-[10px] font-bold tracking-widest uppercase">
              <div className="flex items-center space-x-6 text-gray-500">
                <span>NETWORK TOPOLOGY</span>
                <div className="flex items-center text-white"><div className="w-2 h-2 rounded-full bg-success mr-2"></div> SPG ACTIVE</div>
                <div className="flex items-center text-white"><div className="w-2 h-2 rounded-full bg-primary mr-2"></div> VISA BASE II</div>
              </div>
              <div className="flex items-center space-x-8">
                <div className="flex space-x-4 text-gray-500">
                  <span>MADA</span>
                  <span>VISA</span>
                  <span>MASTERCARD</span>
                </div>
                <div className="flex items-center space-x-2 text-gray-400 font-mono">
                  <Icon name="clock" size={12} />
                  <span>{time}</span>
                </div>
                <div className="flex items-center space-x-4">
                  <div className="text-right leading-tight">
                    <div className="text-white">admin</div>
                    <div className="text-gray-500 text-[8px]">SECURITY OFFICER</div>
                  </div>
                  <Icon name="log-out" size={14} className="text-gray-400 hover:text-white cursor-pointer" />
                </div>
              </div>
            </div>

            {/* Main Header */}
            <div className="px-10 py-6 flex justify-between items-center relative">
              <div className="absolute top-[-50%] left-[20%] w-[40%] h-[200%] bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
              
              <div>
                <div className="flex items-center space-x-3 mb-2">
                  <div className="bg-primary/20 text-primary border border-primary/30 px-3 py-1 rounded flex items-center text-[10px] font-bold uppercase tracking-wider">
                    <Icon name="radio" size={12} className="mr-2" /> INTELLIGENCE MODE
                  </div>
                  <span className="text-[10px] font-mono text-gray-500">NODE_FX_V4_SECURE</span>
                </div>
                <h1 className="text-4xl font-black text-white flex items-center tracking-tight">
                  <Icon name="arrow-right-left" size={32} className="mr-4 text-primary" />
                  Remittance Intelligence Hub
                </h1>
              </div>

              <div className="bg-black/40 border border-white/5 rounded-2xl p-4 flex items-center space-x-4">
                <div>
                  <span className="text-[10px] font-bold text-gray-500 uppercase tracking-widest block">Market Liquidity</span>
                  <span className="text-success font-black tracking-widest uppercase">OPTIMAL</span>
                </div>
                <Icon name="activity" size={24} className="text-success" />
              </div>
            </div>

            {/* Main Grid */}
            <div className="flex-1 px-10 pb-10 flex space-x-8 overflow-hidden z-10">
              
              {/* Left Column: Transfer Config */}
              <div className="w-[380px] flex flex-col space-y-6">
                <div className="bg-panel border border-white/5 rounded-[2rem] p-8 flex flex-col relative overflow-hidden shadow-2xl">
                  {/* Subtle top border glow */}
                  <div className="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-purple-500 via-primary to-blue-500 opacity-50"></div>
                  
                  <h2 className="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mb-8">Transfer Configuration</h2>
                  
                  {/* You Send */}
                  <div className="mb-8">
                    <div className="flex justify-between items-end mb-4">
                      <label className="text-xs font-bold text-white uppercase tracking-wider">You Send</label>
                      <span className="text-[10px] font-bold text-gray-500 uppercase">SAR</span>
                    </div>
                    <div className="relative">
                      <input 
                        type="number" 
                        value={wireInput}
                        onChange={e => setWireInput(e.target.value)}
                        className="w-full bg-surface border border-white/10 rounded-2xl py-4 pl-6 pr-16 text-3xl font-black text-white focus:outline-none focus:border-primary transition-colors appearance-none"
                      />
                      <button className="absolute right-2 top-2 bottom-2 aspect-square bg-primary/20 hover:bg-primary/30 text-primary rounded-xl flex items-center justify-center transition-colors">
                        <Icon name="search" size={20} />
                      </button>
                    </div>
                  </div>

                  {/* Destination Rail */}
                  <div className="flex-1 flex flex-col min-h-0">
                    <label className="text-xs font-bold text-white uppercase tracking-wider mb-4 block">Destination Rail</label>
                    <div className="flex-1 overflow-y-auto custom-scrollbar space-y-3 pr-2">
                      
                      {destinations.map(dest => (
                        <div 
                          key={dest.code}
                          onClick={() => setSelectedDest(dest.code)}
                          className={`cursor-pointer transition-all rounded-2xl p-4 flex items-center justify-between border 
                            ${selectedDest === dest.code 
                              ? 'bg-primary/10 border-primary shadow-[0_0_20px_rgba(59,130,246,0.15)]' 
                              : 'bg-surface border-white/5 hover:border-white/20'}`}
                        >
                          <div className="flex items-center space-x-4">
                            <div className={`px-2 py-1 rounded text-[10px] font-black ${selectedDest === dest.code ? 'bg-primary text-white' : 'bg-white/10 text-gray-400'}`}>
                              {dest.code}
                            </div>
                            <span className={`text-sm font-bold tracking-wide ${selectedDest === dest.code ? 'text-white' : 'text-gray-400'}`}>
                              {dest.label}
                            </span>
                          </div>
                          <Icon name="chevron-right" size={16} className={selectedDest === dest.code ? 'text-primary' : 'text-gray-600'} />
                        </div>
                      ))}

                    </div>
                  </div>
                </div>

                {/* Compliance Badge */}
                <div className="bg-surface border border-white/5 rounded-2xl p-5 flex items-start space-x-4">
                  <div className="bg-success/10 p-2 rounded-xl text-success">
                    <Icon name="shield-check" size={24} />
                  </div>
                  <div>
                    <h3 className="text-xs font-bold text-white uppercase tracking-wider mb-1">Mada Secure Pipeline</h3>
                    <p className="text-[10px] text-gray-500 leading-relaxed font-medium">
                      All calculations adhere to SPG-4 compliance. Final settlement rates are guaranteed for 60 seconds from ingestion.
                    </p>
                  </div>
                </div>
              </div>

              {/* Right Column: Analytics & Payouts */}
              <div className="flex-1 flex flex-col space-y-6">
                
                {/* Anitha AI Widget */}
                <div className="bg-gradient-to-r from-[#1E1B4B] to-[#312E81] border border-brandBlue/30 rounded-2xl p-6 flex justify-between items-center shadow-[0_0_30px_rgba(79,70,229,0.15)]">
                  <div className="flex items-center space-x-5">
                    <div className="bg-white p-3 rounded-xl">
                      <Icon name="zap" size={24} className="text-brandBlue" />
                    </div>
                    <div>
                      <div className="text-[10px] font-bold text-brandBlue/70 uppercase tracking-widest mb-1">Anitha AI™ Market Pulse</div>
                      <div className="text-white font-medium italic tracking-wide">
                        "{pulse}"
                      </div>
                    </div>
                  </div>
                  <button className="bg-white text-black px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-gray-200 transition-colors">
                    Lock Best Rate
                  </button>
                </div>

                {/* Payout Ranking Area */}
                <div className="flex-1 bg-panel border border-white/5 rounded-[2rem] p-8 flex flex-col relative overflow-hidden">
                  
                  <div className="flex justify-between items-center mb-8">
                    <h2 className="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em]">Effective Payout Ranking</h2>
                    <div className="flex items-center text-[10px] font-mono text-gray-500 uppercase">
                      Sort: High-to-Low Net Received <Icon name="bar-chart-2" size={12} className="ml-2" />
                    </div>
                  </div>

                  {/* Cards */}
                  <div className="grid grid-cols-2 gap-6 mb-8">
                    {/* Bank to Bank (Active) */}
                    <div className="bg-surface border border-primary/40 rounded-2xl p-6 flex flex-col relative shadow-[0_0_30px_rgba(59,130,246,0.1)]">
                      <div className="absolute top-[-10px] left-8 bg-primary w-12 h-2 rounded-b-xl"></div>
                      
                      <div className="flex justify-between items-center border-b border-white/5 pb-4 mb-4">
                        <span className="text-xs font-bold text-white uppercase tracking-wider">Bank To Bank</span>
                        <span className="text-[10px] font-black text-primary bg-primary/10 px-2 py-1 rounded uppercase tracking-widest">Standard</span>
                      </div>
                      
                      <div className="grid grid-cols-2 gap-4 mb-8">
                        <div>
                          <span className="text-[10px] font-bold text-gray-500 uppercase tracking-widest block mb-2">Exchange Rate</span>
                          <span className="text-sm font-mono text-white">{selectedDest} {payoutBreakdown ? payoutBreakdown.activeFxRate.toFixed(4) : '...'}</span>
                        </div>
                        <div className="text-right">
                          <span className="text-[10px] font-bold text-gray-500 uppercase tracking-widest block mb-2">Transfer Fee</span>
                          <span className="text-sm font-mono text-white">{payoutBreakdown ? payoutBreakdown.flatFeeBase.toFixed(2) : '0'} SAR</span>
                        </div>
                      </div>

                      <div className="mt-auto flex justify-between items-end">
                        <span className="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Net Amount</span>
                        <div className="text-3xl font-black font-mono text-success">
                          {payoutBreakdown ? payoutBreakdown.settledAmount.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) : 'NaN'} <span className="text-lg">{selectedDest}</span>
                        </div>
                      </div>
                    </div>

                    {/* Cash Pickup (Inactive) */}
                    <div className="bg-surface/50 border border-white/5 rounded-2xl p-6 flex items-center justify-center">
                      <span className="text-xs font-bold text-gray-600 uppercase tracking-widest">Cash Pickup Unavailable</span>
                    </div>
                  </div>

                  {/* Metrics Row */}
                  <div className="grid grid-cols-4 gap-4 mt-auto">
                    <div className="bg-surface border border-white/5 rounded-xl p-4 flex flex-col justify-center items-center text-center">
                      <span className="text-[9px] font-bold text-gray-500 uppercase tracking-widest block mb-2">Spread Advantage</span>
                      <span className="text-lg font-black text-white">{payoutBreakdown ? `+${(payoutBreakdown.appliedSpreadPct*100).toFixed(2)}%` : '+0.00%'}</span>
                    </div>
                    
                    <div className="bg-surface border border-white/5 rounded-xl p-4 flex flex-col justify-center items-center text-center opacity-50">
                      <span className="text-[9px] font-bold text-gray-500 uppercase tracking-widest block mb-2">Best Value</span>
                      <span className="text-lg font-black text-white">--</span>
                    </div>

                    <div className="bg-surface border border-white/5 rounded-xl p-4 flex flex-col justify-center items-center text-center">
                      <span className="text-[9px] font-bold text-gray-500 uppercase tracking-widest block mb-2">Last Updated</span>
                      <span className="text-xs font-black text-white flex items-center">
                        <Icon name="clock" size={12} className="text-success mr-2" /> 
                        {payoutBreakdown && payoutBreakdown.updatedAt ? new Date(payoutBreakdown.updatedAt).toLocaleTimeString() : '...'}
                      </span>
                    </div>

                    <div className="bg-primary/10 border border-primary/20 rounded-xl p-4 flex flex-col justify-center items-center text-center">
                      <span className="text-[9px] font-bold text-primary uppercase tracking-widest block mb-2">Est. Savings</span>
                      <span className="text-lg font-black text-primary">SAR {payoutBreakdown ? (payoutBreakdown.grossBaseAmount * 0.012).toFixed(2) : '0.00'}</span>
                    </div>
                  </div>

                </div>
              </div>

            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<RemittanceHub />);
    </script>
</body>
</html>
