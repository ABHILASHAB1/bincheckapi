<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remittance Admin Portal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      body {
        margin: 0;
        height: 100vh;
        background-color: #030305;
      }
    </style>
</head>
<body>
    <div id="root" class="h-full"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      const Icon = ({ name, size = 24, className = "" }) => (
        <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>
      );

      function AdminPortal() {
        const [fxRates, setFxRates] = useState([]);
        const [selectedPair, setSelectedPair] = useState('SAR/INR');
        const [overrideRate, setOverrideRate] = useState('');
        const [statusMsg, setStatusMsg] = useState('');

        const fetchRates = async () => {
          try {
            const res = await fetch('http://localhost:3002/api/fx-rates');
            if (res.ok) {
              const data = await res.json();
              if (data && data.length > 0) setFxRates(data);
            }
          } catch (err) {
            console.error('Failed to fetch FX rates from backend:', err);
          }
        };

        useEffect(() => {
          fetchRates(); // Initial fetch
          const interval = setInterval(fetchRates, 3000); // Poll every 3 seconds
          return () => clearInterval(interval);
        }, []);

        useEffect(() => {
          lucide.createIcons();
        }, [fxRates, selectedPair, statusMsg]);

        const handleForceUpdate = async () => {
          if (!overrideRate || isNaN(parseFloat(overrideRate))) {
            setStatusMsg('❌ Invalid rate input.');
            return;
          }

          try {
            const res = await fetch('http://localhost:3002/api/fx-rates', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ pair: selectedPair, rate: parseFloat(overrideRate) })
            });
            
            const result = await res.json();
            if (res.ok) {
              setStatusMsg(`✅ Successfully updated ${selectedPair} to ${overrideRate}`);
              setOverrideRate('');
              fetchRates(); // Refresh immediately
            } else {
              setStatusMsg(`❌ Error: ${result.error}`);
            }
          } catch (err) {
            setStatusMsg(`❌ Network Error.`);
          }
          
          setTimeout(() => setStatusMsg(''), 5000);
        };

        return (
          <div className="h-full w-full flex flex-col p-8 space-y-6 overflow-hidden bg-[#030305] text-gray-200 relative min-h-screen">
            <div className="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-purple-500/10 rounded-full blur-[120px] pointer-events-none"></div>

            {/* Header */}
            <div className="flex justify-between items-end relative z-10 border-b border-white/5 pb-4">
              <div className="flex items-center space-x-4">
                <div className="w-12 h-12 bg-gradient-to-br from-rose-600 to-purple-600 rounded-2xl flex items-center justify-center shadow-[0_0_30px_rgba(225,29,72,0.3)]">
                   <Icon name="shield-alert" size={24} className="text-white" />
                </div>
                <div>
                  <h1 className="text-3xl font-black text-white tracking-tighter uppercase flex items-center">
                    Enterprise Admin Portal
                  </h1>
                  <p className="text-[10px] text-rose-400 font-mono tracking-[0.4em] mt-1 uppercase flex items-center">
                    <span className="w-1.5 h-1.5 bg-rose-400 rounded-full animate-pulse mr-2"></span>
                    SUPERVISOR OVERRIDE ACTIVE
                  </p>
                </div>
              </div>
            </div>

            <div className="flex-1 relative z-10 overflow-hidden flex flex-col items-center justify-center">
              
              <div className="w-full max-w-2xl bg-black/40 border border-white/10 rounded-2xl p-8 flex flex-col space-y-8 shadow-2xl">
                <div className="flex items-center justify-between border-b border-white/5 pb-4">
                  <h2 className="text-lg font-black text-gray-400 uppercase tracking-widest flex items-center">
                    <Icon name="terminal" size={20} className="mr-3 text-rose-400" /> Force Market Update
                  </h2>
                </div>
                
                <div className="space-y-6">
                  {/* Select Pair */}
                  <div>
                    <label className="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 block">Select Currency Pair</label>
                    <select 
                      value={selectedPair}
                      onChange={(e) => setSelectedPair(e.target.value)}
                      className="w-full bg-black/50 border border-white/10 rounded-xl p-4 text-xl font-mono text-white focus:outline-none focus:border-rose-500 transition-colors cursor-pointer appearance-none"
                    >
                      {fxRates.map(fx => (
                        <option key={fx.pair} value={fx.pair}>{fx.pair} (Current: {fx.rate.toFixed(4)})</option>
                      ))}
                    </select>
                  </div>

                  {/* Input Rate */}
                  <div>
                    <label className="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 block">New Base Rate</label>
                    <input 
                      type="number" 
                      step="0.0001"
                      placeholder="e.g. 23.5000"
                      value={overrideRate}
                      onChange={(e) => setOverrideRate(e.target.value)}
                      className="w-full bg-black/50 border border-white/10 rounded-xl p-4 text-2xl font-mono text-white focus:outline-none focus:border-rose-500 transition-colors"
                    />
                  </div>

                  {/* Submit Button */}
                  <button 
                    onClick={handleForceUpdate}
                    className="w-full bg-rose-600 hover:bg-rose-500 text-white font-bold py-4 rounded-xl uppercase tracking-widest transition-colors flex items-center justify-center shadow-[0_0_20px_rgba(225,29,72,0.4)]"
                  >
                    <Icon name="zap" size={20} className="mr-2" />
                    Force Market Inject
                  </button>

                  {statusMsg && (
                    <div className="p-4 rounded-xl bg-black/50 border border-white/10 text-center text-sm font-mono text-white">
                      {statusMsg}
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<AdminPortal />);
    </script>
</body>
</html>
