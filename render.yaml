# render.yaml
services:
  - type: web
    name: mada-simulator
    env: docker
    plan: starter # or free
    region: ohio # Change as needed
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: DB_PATH
        value: /opt/render/project/data/bins.sqlite
    disk:
      name: data
      mountPath: /opt/render/project/data
      sizeGB: 1
    ports:
      - port: 3002
        protocol: TCP
      - port: 8583
        protocol: TCP # Note: Render Web Services primarily expose one HTTP port. 
                      # For full TCP Switch access, a Render 'Background Worker' or 
                      # a dedicated Private Service might be required for port 8583.
